<!DOCTYPE html>
<html>
<head>
    <title>JavaScript Arrays Example</title>
</head>
<body>
    <h1>JavaScript Array Methods Demonstration</h1>

    <script>
        // Creating an array
        let fruits = ['Apple', 'Banana', 'Cherry', 'Date'];
        
        // Accessing elements
        console.log("Original array: ", fruits);

        // Using length property
        console.log("Length of array: ", fruits.length);

        // Using push method
        fruits.push('Elderberry');
        console.log("After push: ", fruits);

        // Using pop method
        let poppedFruit = fruits.pop();
        console.log("After pop (removed " + poppedFruit + "): ", fruits);

        // Using shift method
        let shiftedFruit = fruits.shift();
        console.log("After shift (removed " + shiftedFruit + "): ", fruits);

        // Using unshift method
        fruits.unshift('Fig');
        console.log("After unshift: ", fruits);

        // Using slice method
        let slicedFruits = fruits.slice(1, 3);
        console.log("Sliced array (index 1 to 3): ", slicedFruits);

        // Using splice method
        fruits.splice(1, 2, 'Grapefruit', 'Honeydew');
        console.log("After splice (replaced at index 1): ", fruits);
    </script>
</body>
</html>
